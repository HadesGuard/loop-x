global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3001']

  # Optional: container-level metrics via cAdvisor (if enabled in compose)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

