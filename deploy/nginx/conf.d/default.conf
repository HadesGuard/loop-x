# Nginx reverse proxy for LoopX

# Upstreams on the internal Docker network
upstream loop_backend {
  server backend:3001;
  keepalive 32;
}

upstream loop_frontend {
  server frontend:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _; # Replace with your domain if desired

  # Redirect plain HTTP to HTTPS if certificates are provided
  # Comment if you want to serve HTTP only (not recommended)
  if (-f /etc/nginx/certs/fullchain.pem) {
    return 301 https://$host$request_uri;
  }

  # Health endpoint proxies to backend
  location = /health {
    proxy_pass http://loop_backend/health;
  }

  # API routes
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://loop_backend$request_uri;
  }

  # WebSocket upgrades (Socket.IO)
  location /socket.io/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://loop_backend$request_uri;
  }

  # Everything else → frontend
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://loop_frontend$request_uri;
  }
}

# TLS server (activated when certs are mounted)
server {
  listen 443 ssl http2;
  server_name _; # Replace with your domain

  # Expect certificates at /etc/nginx/certs (mounted via volume)
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  # Modern TLS config
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  ssl_prefer_server_ciphers off;

  # HSTS (preload) remove if debugging
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Health endpoint proxies to backend
  location = /health {
    proxy_pass http://loop_backend/health;
  }

  # API routes
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://loop_backend$request_uri;
  }

  # WebSocket upgrades (Socket.IO)
  location /socket.io/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://loop_backend$request_uri;
  }

  # Everything else → frontend
  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://loop_frontend$request_uri;
  }
}

