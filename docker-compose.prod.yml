
services:
  postgres:
    image: postgres:16-alpine
    container_name: loop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loop_password}
      POSTGRES_DB: ${POSTGRES_DB:-loop_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loop_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [loop-network]

  redis:
    image: redis:7-alpine
    container_name: loop-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [loop-network]

  backend:
    build:
      context: ./loop-backend
      dockerfile: Dockerfile
    image: loop-backend:latest
    container_name: loop-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Expose only to the internal network; proxy terminates public traffic
    # Comment the line below in if you want direct access for debugging
    # ports:
    #   - "3001:3001"
    env_file:
      - loop-backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Connect to compose services instead of localhost
      DATABASE_URL: postgresql://$${POSTGRES_USER:-loop_user}:$${POSTGRES_PASSWORD:-loop_password}@postgres:5432/$${POSTGRES_DB:-loop_db}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FFMPEG_PATH: /usr/bin/ffmpeg
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [loop-network]

  # Dedicated worker process (BullMQ) using the backend image.
  # The codebase initializes the worker via importing the queue module.
  # We run only the worker here without starting the HTTP server.
  worker:
    image: loop-backend:latest
    container_name: loop-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - loop-backend/.env
    environment:
      NODE_ENV: production
      # Match backend DB/Redis service hosts
      DATABASE_URL: postgresql://$${POSTGRES_USER:-loop_user}:$${POSTGRES_PASSWORD:-loop_password}@postgres:5432/$${POSTGRES_DB:-loop_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FFMPEG_PATH: /usr/bin/ffmpeg
    command: ["sh", "-lc", "node -e \"import('./dist/queues/video-processing.queue.js'); setInterval(()=>{}, 1<<30)\" "]
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [loop-network]

  frontend:
    build:
      context: ./loop-ui
      dockerfile: Dockerfile
      args:
        # Available at image build time for Next static optimization
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    image: loop-frontend:latest
    container_name: loop-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    stop_grace_period: 20s
    networks: [loop-network]

  nginx:
    image: nginx:1.25-alpine
    container_name: loop-nginx
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [loop-network]

  prometheus:
    image: prom/prometheus:latest
    container_name: loop-prometheus
    depends_on:
      - backend
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # optional: expose Prometheus UI
    restart: unless-stopped
    networks: [loop-network]

  grafana:
    image: grafana/grafana:10.4.3
    container_name: loop-grafana
    depends_on:
      - prometheus
    environment:
      # Set via env or override at runtime; avoid committing secrets
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3002:3000" # optional: expose Grafana at http://localhost:3002
    restart: unless-stopped
    networks: [loop-network]

  # Optional: container metrics for memory/disk pressure alerts
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: loop-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks: [loop-network]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  loop-network:
    driver: bridge
