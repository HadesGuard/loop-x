openapi: 3.0.3
info:
  title: Loop Backend API
  version: 1.0.0
  description: |
    OpenAPI 3.0 specification for the Loop backend service.

    This spec is derived from:
    - `docs/api-specs.md` for intended endpoint behavior and examples
    - route registrations under `src/routes/`
    - Zod validators under `src/validators/`
    - controller response envelopes under `src/controllers/`
servers:
  - url: https://api.loop.com/v1
    description: Production API (documented)
  - url: http://localhost:3000
    description: Local development API
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Videos
  - name: Feed
  - name: Comments
  - name: Conversations
  - name: Notifications
  - name: Search
  - name: Hashtags
  - name: Discovery
  - name: Analytics
  - name: Watch History
  - name: Privacy
  - name: Reports
  - name: Sounds
  - name: Uploads
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [Health]
      operationId: healthCheck
      summary: Health check
      security: []
      responses:
        '200':
          description: Service health metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: user@example.com
              password: securePassword123
              username: username
              fullName: Full Name
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                success: true
                data:
                  user:
                    id: user_id
                    username: username
                    email: user@example.com
                    fullName: Full Name
                    avatar: null
                    isVerified: false
                    createdAt: '2024-01-01T00:00:00Z'
                  token: jwt_token_here
                  refreshToken: refresh_token_here
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: user@example.com
              password: securePassword123
              rememberMe: false
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                success: true
                data:
                  user:
                    id: user_id
                    username: username
                    email: user@example.com
                    fullName: Full Name
                    avatar: null
                    isVerified: false
                    createdAt: '2024-01-01T00:00:00Z'
                  token: jwt_token_here
                  refreshToken: refresh_token_here
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout current user
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: Logged out successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/google:
    post:
      tags: [Auth]
      operationId: googleAuth
      summary: Authenticate with Google
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'
      responses:
        '200':
          description: OAuth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/apple:
    post:
      tags: [Auth]
      operationId: appleAuth
      summary: Authenticate with Apple
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleAuthRequest'
      responses:
        '200':
          description: OAuth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/wallet/nonce:
    post:
      tags: [Auth]
      operationId: generateWalletNonce
      summary: Generate nonce for wallet authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletNonceRequest'
      responses:
        '200':
          description: Nonce generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletNonceResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/wallet/verify:
    post:
      tags: [Auth]
      operationId: verifyWallet
      summary: Verify signed wallet challenge
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletVerifyRequest'
      responses:
        '200':
          description: Wallet verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request password reset
      description: Documented in `api-specs.md` but not currently mounted in `src/routes/auth.routes.ts`.
      security: []
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password with token
      description: Documented in `api-specs.md` but not currently mounted in `src/routes/auth.routes.ts`.
      security: []
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: Get current user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      tags: [Users]
      operationId: updateProfile
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      tags: [Users]
      operationId: deleteAccount
      summary: Delete current user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: Account deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/avatar:
    post:
      tags: [Users]
      operationId: uploadAvatar
      summary: Upload avatar file or set avatar URL
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadAvatarMultipartRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/UploadAvatarUrlRequest'
      responses:
        '200':
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/saved:
    get:
      tags: [Users]
      operationId: getSavedVideos
      summary: Get current user's saved videos
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Saved videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListCursorEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/blocked:
    get:
      tags: [Privacy]
      operationId: getBlockedUsers
      summary: Get blocked users
      responses:
        '200':
          description: Blocked users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedUsersResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me/privacy-settings:
    get:
      tags: [Privacy]
      operationId: getPrivacySettings
      summary: Get privacy settings
      responses:
        '200':
          description: Privacy settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettingsEnvelope'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      tags: [Privacy]
      operationId: updatePrivacySettings
      summary: Update privacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacySettingsRequest'
      responses:
        '200':
          description: Privacy settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: Privacy settings updated successfully
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/{username}:
    get:
      tags: [Users]
      operationId: getUserByUsername
      summary: Get user profile by username
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /users/{username}/videos:
    get:
      tags: [Users]
      operationId: getUserVideos
      summary: Get videos by username
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: User videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListCursorEnvelope'

  /users/{username}/followers:
    get:
      tags: [Users]
      operationId: getUserFollowers
      summary: Get user followers
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Followers list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListCursorEnvelope'

  /users/{username}/following:
    get:
      tags: [Users]
      operationId: getUserFollowing
      summary: Get users that the user is following
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Following list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListCursorEnvelope'

  /users/{username}/liked:
    get:
      tags: [Users]
      operationId: getUserLikedVideos
      summary: Get liked videos by username
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Liked videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListCursorEnvelope'

  /users/{username}/saved:
    get:
      tags: [Users]
      operationId: getUserSavedVideosByUsername
      summary: Get saved videos by username
      description: Documented in `api-specs.md`; implemented route currently exposes saved videos at `/users/me/saved`.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Saved videos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchHistoryEnvelope'

  /users/{username}/follow:
    post:
      tags: [Users]
      operationId: followUser
      summary: Follow a user
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
      responses:
        '200':
          description: Followed user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: User followed successfully
    delete:
      tags: [Users]
      operationId: unfollowUser
      summary: Unfollow a user
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
      responses:
        '200':
          description: Unfollowed user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: User unfollowed successfully

  /users/{username}/block:
    post:
      tags: [Privacy]
      operationId: blockUser
      summary: Block a user
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
      responses:
        '200':
          description: User blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: User blocked successfully
    delete:
      tags: [Privacy]
      operationId: unblockUser
      summary: Unblock a user
      parameters:
        - $ref: '#/components/parameters/UsernamePathParam'
      responses:
        '200':
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: User unblocked successfully

  /videos:
    post:
      tags: [Videos]
      operationId: uploadVideo
      summary: Upload a video
      description: Uploads a single `video` file plus metadata.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadVideoMultipartRequest'
            encoding:
              video:
                contentType: video/mp4, video/quicktime, video/x-msvideo, video/webm
            example:
              title: Weekend travel vlog
              description: Highlights from Da Nang trip
              privacy: public
              allowComments: true
              allowDuet: true
              allowStitch: true
      responses:
        '201':
          description: Video uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoEnvelopeWithMessage'
              example:
                success: true
                message: Video uploaded successfully
                data:
                  video:
                    id: video_id
                    title: Weekend travel vlog
                    description: Highlights from Da Nang trip
                    privacy: public
                    allowComments: true
                    allowDuet: true
                    allowStitch: true
                    status: processing
                    createdAt: '2024-01-01T00:00:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /videos/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPathParam'
    get:
      tags: [Videos]
      operationId: getVideo
      summary: Get video by ID
      responses:
        '200':
          description: Video details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Videos]
      operationId: updateVideo
      summary: Update video metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVideoRequest'
      responses:
        '200':
          description: Video updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoEnvelopeWithMessage'
              example:
                success: true
                message: Video updated successfully
                data:
                  video: {}
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      tags: [Videos]
      operationId: deleteVideo
      summary: Delete a video
      responses:
        '200':
          description: Video deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: Video deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /videos/{id}/thumbnail:
    post:
      tags: [Videos]
      operationId: updateVideoThumbnail
      summary: Update video thumbnail
      description: Documented in `api-specs.md` but not currently mounted in `src/routes/video.routes.ts`.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadThumbnailRequest'
      responses:
        '200':
          description: Thumbnail updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /videos/{id}/analytics:
    get:
      tags: [Analytics]
      operationId: getVideoAnalytics
      summary: Get analytics for a specific video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Video analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsEnvelope'

  /videos/{id}/track-view:
    post:
      tags: [Analytics]
      operationId: trackView
      summary: Track a video view
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackViewRequest'
      responses:
        '200':
          description: View tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                success: true
                message: View tracked

  /videos/{id}/stream:
    get:
      tags: [Videos]
      operationId: streamVideo
      summary: Stream video binary
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Video byte stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /videos/{id}/hls:
    get:
      tags: [Videos]
      operationId: streamVideoHls
      summary: Get HLS stream info
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: HLS or direct stream metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HlsInfoEnvelope'

  /videos/{id}/like:
    post:
      tags: [Videos]
      operationId: likeVideo
      summary: Like a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Like state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleLikeEnvelope'
    delete:
      tags: [Videos]
      operationId: unlikeVideo
      summary: Unlike a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Like state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleLikeEnvelope'

  /videos/{id}/save:
    post:
      tags: [Videos]
      operationId: saveVideo
      summary: Save a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Save state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleSaveEnvelope'
    delete:
      tags: [Videos]
      operationId: unsaveVideo
      summary: Unsave a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Save state changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleSaveEnvelope'

  /videos/{id}/share:
    post:
      tags: [Videos]
      operationId: shareVideo
      summary: Record a share action
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareVideoRequest'
      responses:
        '200':
          description: Share recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareEnvelope'

  /videos/{id}/comments:
    get:
      tags: [Comments]
      operationId: getVideoComments
      summary: Get comments for a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/CommentsLimitParam'
        - $ref: '#/components/parameters/CommentSortParam'
      responses:
        '200':
          description: Comments list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentsEnvelope'
    post:
      tags: [Comments]
      operationId: addVideoComment
      summary: Add a comment to a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentEnvelope'

  /videos/{id}/duet:
    post:
      tags: [Videos]
      operationId: createDuet
      summary: Create a duet video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DuetMultipartRequest'
      responses:
        '200':
          description: Duet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataEnvelope'

  /videos/{id}/duets:
    get:
      tags: [Videos]
      operationId: getDuets
      summary: Get duets for a video
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Duet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataEnvelope'

  /videos/{id}/duet-info:
