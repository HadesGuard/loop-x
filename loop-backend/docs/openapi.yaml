components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UsernamePathParam:
      name: username
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[a-zA-Z0-9_]+$'
    TagPathParam:
      name: tag
      in: path
      required: true
      schema:
        type: string
    VideoIdPathParam:
      name: videoId
      in: path
      required: true
      schema:
        type: string
    ChunkIndexPathParam:
      name: index
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
    CursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Cursor for cursor-based pagination
    CursorUuidParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
