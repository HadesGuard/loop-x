    DeleteHistoryRequest:
      type: object
      properties:
        videoIds:
          type: array
          items:
            type: string

    CreateReportRequest:
      type: object
      required: [type, targetId, reason]
      properties:
        type:
          type: string
          enum: [user, video]
        targetId:
          type: string
          format: uuid
        reason:
          type: string
          enum: [spam, harassment, inappropriate, violence, copyright, other]
        description:
          type: string
          maxLength: 1000

    ReviewReportRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [reviewed, resolved, dismissed]
        notes:
          type: string
          maxLength: 2000

    ModerationActionRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
          enum: [warn, remove_content, suspend_user]
        reason:
          type: string
          minLength: 1
          maxLength: 2000

    ReportEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            report:
              $ref: '#/components/schemas/GenericObject'

    ReportEnvelopeWithMessage:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          type: object
          properties:
            report:
              $ref: '#/components/schemas/GenericObject'

    FavoriteEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            favorited:
              type: boolean

    GenresEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            genres:
              type: array
              items:
                type: string

    InitiateUploadRequest:
      type: object
      required:
        - fileName
        - fileSize
        - mimeType
        - title
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        fileSize:
          type: integer
          minimum: 1
          maximum: 524288000
        mimeType:
          type: string
          pattern: '^video/'
        title:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        privacy:
          type: string
          enum: [public, private, followers]
          default: public
        allowComments:
          type: boolean
          default: true
        allowDuet:
          type: boolean
          default: true
        allowStitch:
          type: boolean
          default: true

    UploadSoundMultipartRequest:
      type: object
      required: [audio, title]
      properties:
        audio:
          type: string
          format: binary
        title:
          type: string
          minLength: 1
        genre:
          type: string
        description:
          type: string

    GenericDataEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/GenericObject'

    GenericDataWithMessageEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data:
          $ref: '#/components/schemas/GenericObject'
